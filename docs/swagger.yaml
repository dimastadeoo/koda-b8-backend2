definitions:
  lib.Response:
    properties:
      message:
        type: string
      results: {}
      success:
        type: boolean
    type: object
  models.Users:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      email:
        type: string
      fullname:
        type: string
      id:
        type: integer
      picture:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact:
    email: dimastadeoo@gmail.com
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates a user using email and password, returns a JWT token.
      parameters:
      - description: User email
        format: email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns token and user data
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/lib.Response'
      summary: User login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new user account with fullname, email, and password.
      parameters:
      - description: User full name
        in: formData
        name: fullname
        required: true
        type: string
      - description: User email
        format: email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Returns user data or success message
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid request payload (e.g., missing fields, invalid email
            format)
          schema:
            $ref: '#/definitions/lib.Response'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/lib.Response'
      summary: Register a new user
      tags:
      - auth
  /users:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: requires a valid JWT token to fetch metadata
      parameters:
      - description: Search by fullname
        in: query
        name: search[fullname]
        type: string
      - description: Search by email
        in: query
        name: search[email]
        type: string
      - description: 'Page number. Default: 1 if limit is specified.'
        in: query
        minimum: 1
        name: page
        type: integer
      - description: 'Number of items per page. Default: 10 if page is specified.'
        in: query
        minimum: 1
        name: limit
        type: integer
      - description: Sort by ID
        enum:
        - asc
        - desc
        in: query
        name: sort[id]
        type: string
      - description: Sort by Fullname
        enum:
        - asc
        - desc
        in: query
        name: sort[fullname]
        type: string
      - description: Sort by Email
        enum:
        - asc
        - desc
        in: query
        name: sort[email]
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Users'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: List All Users
      tags:
      - users
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Admin creates a new user account. Requires authentication.
      parameters:
      - description: User full name
        in: formData
        name: fullname
        required: true
        type: string
      - description: User email
        format: email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: Create a new user (require auth login)
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/x-www-form-urlencoded
      description: Permanently deletes a user from the system. Requires authentication
        and proper authorization (user owns the account or admin).
      parameters:
      - description: User ID (numeric)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User Success Deleted
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid ID format or service error (e.g., user not found)
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized (missing or invalid JWT)
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden (not authorized to delete this user)
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: Delete user by ID
      tags:
      - users
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Retrieves detailed information of a specific user by their unique
        ID. Requires authentication.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns the user data (password excluded)
          schema:
            $ref: '#/definitions/models.Users'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized (missing or invalid JWT)
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: Get user by ID
      tags:
      - users
    patch:
      consumes:
      - application/x-www-form-urlencoded
      description: Updates the fullname and email of an existing user. Requires authentication
        (JWT) and the user must own the account or have admin privileges.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: New full name
        in: formData
        name: fullname
        required: true
        type: string
      - description: New email
        format: email
        in: formData
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns updated user data
          schema:
            $ref: '#/definitions/models.Users'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: Update user's fullname and email
      tags:
      - users
  /users/{id}/picture:
    patch:
      consumes:
      - multipart/form-data
      description: Uploads a new profile picture for the user. The file must be in
        JPG, JPEG, PNG, or WEBP format with a maximum size of 2 MB. The old picture
        file will be automatically removed.
      parameters:
      - description: User ID (numeric)
        in: path
        name: id
        required: true
        type: string
      - description: Profile picture file (jpg, jpeg, png, webp, max 2MB)
        in: formData
        name: picture
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 'Returns success message: ''user <email> success updated picture'''
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid ID format, invalid file extension, file too large,
            or other bad request
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error (e.g., file save failed)
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
      summary: Update user profile picture
      tags:
      - users
securityDefinitions:
  Bearer:
    description: Type "Bearer " followed by a space and your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
