definitions:
  lib.Response:
    properties:
      message:
        type: string
      results: {}
      success:
        type: boolean
    type: object
  models.Users:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      email:
        type: string
      fullname:
        type: string
      id:
        type: integer
      picture:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact:
    email: dimastadeoo@gmail.com
paths:
  /auth/login:
    post:
      responses:
        "200":
          description: Returns token and user data
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/lib.Response'
  /auth/register:
    post:
      responses:
        "201":
          description: Returns user data or success message
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid request payload (e.g., missing fields, invalid email
            format)
          schema:
            $ref: '#/definitions/lib.Response'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/lib.Response'
  /users:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Users'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
    post:
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
  /users/{id}:
    delete:
      responses:
        "400":
          description: Invalid ID format or service error (e.g., user not found)
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized (missing or invalid JWT)
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden (not authorized to delete this user)
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
    get:
      responses:
        "200":
          description: Returns the user data (password excluded)
          schema:
            $ref: '#/definitions/models.Users'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized (missing or invalid JWT)
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
    patch:
      responses:
        "200":
          description: Returns updated user data
          schema:
            $ref: '#/definitions/models.Users'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/lib.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
  /users/{id}/picture:
    patch:
      responses:
        "200":
          description: 'Returns success message: ''user <email> success updated picture'''
          schema:
            $ref: '#/definitions/lib.Response'
        "400":
          description: Invalid ID format, invalid file extension, file too large,
            or other bad request
          schema:
            $ref: '#/definitions/lib.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/lib.Response'
        "500":
          description: Internal server error (e.g., file save failed)
          schema:
            $ref: '#/definitions/lib.Response'
      security:
      - Bearer: []
securityDefinitions:
  Bearer:
    description: Type "Bearer " followed by a space and your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
