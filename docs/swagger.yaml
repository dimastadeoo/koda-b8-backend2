definitions:
  models.Users:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      email:
        type: string
      fullname:
        type: string
      id:
        type: integer
      picture:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact:
    email: dimastadeoo@gmail.com
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates a user using email and password, returns a JWT token.
      parameters:
      - description: User email
        format: email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns token and user data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request payload
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid email or password
          schema:
            additionalProperties: true
            type: object
      summary: User login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new user account with fullname, email, and password.
      parameters:
      - description: User full name
        in: formData
        name: fullname
        required: true
        type: string
      - description: User email
        format: email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        format: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Returns user data or success message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request payload (e.g., missing fields, invalid email
            format)
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - auth
  /users:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: requires a valid JWT token to fetch metadata
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Users'
            type: array
      security:
      - Bearer: []
      summary: List All Users
      tags:
      - users
securityDefinitions:
  Bearer:
    description: Type "Bearer " followed by a space and your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
