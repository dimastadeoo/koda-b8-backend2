<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">
        <div class="modal-content" style="margin:60px auto;">

            <div class="modal-header">
                <h2>Login</h2>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        name="email"
                        required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        name="password"
                        required>
                </div>
                <button
                    type="submit"
                    class="btn btn-primary"
                    style="width:100%;">
                    Login
                </button>
            </form>
            <br>

            <p style="text-align:center;">
                Belum punya akun?
                <a href="register.html">
                    Register
                </a>
            </p>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>

</html>
