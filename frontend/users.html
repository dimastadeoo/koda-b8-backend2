<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <header class="header">
            <h1>User Management</h1>
            <div class="header-action">
                <button
                    class="btn btn-success"
                    onclick="openCreateModal()">
                    + Tambah User
                </button>
                <button
                    class="btn btn-danger"
                    onclick="logout()">
                    Logout
                </button>
            </div>
        </header>

        <table>
            <thead>
                <tr>
                    <th width="80">ID</th>
                    <th>Fullname</th>
                    <th>Email</th>
                    <th>Created At</th>
                    <th>Updated At</th>
                    <th width="180">Action</th>
                </tr>
            </thead>
            <tbody id="tbody">
            </tbody>
        </table>
    </div>


    <!-- ========================= -->
    <!-- MODAL -->
    <!-- ========================= -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">
                    Tambah User
                </h2>
                <span
                    class="close"
                    onclick="closeModal()">
                    &times;
                </span>
            </div>
            <form id="userForm">
                <input
                    type="hidden"
                    id="userId"
                    name="id">
                <div class="form-group">
                    <label>Fullname</label>
                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>
                </div>
                <div
                    class="form-group"
                    id="passwordGroup">
                    <label>Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password">
                </div>
                <div
                    class="form-group"
                    id="retypePasswordGroup">
                    <label>Retype Password</label>
                    <input
                        type="password"
                        id="retypePassword">
                </div>
                <div class="modal-footer">
                    <button
                        class="btn btn-primary"
                        id="submitBtn"
                        type="submit">
                        Simpan
                    </button>
                    <button
                        class="btn btn-secondary"
                        type="button"
                        onclick="closeModal()">
                        Batal
                    </button>
                </div>
            </form>
        </div>

    </div>

    <script src="js/users.js"></script>

</body>

</html>
